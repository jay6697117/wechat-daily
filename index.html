<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>群聊日更漫画馆</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      /* 午夜金紫底色系 */
      --bg: #0c0a16;
      --bg-soft: #130f24;
      --panel: rgba(22, 16, 40, 0.55);
      --panel-hover: rgba(35, 26, 60, 0.7);
      --border: rgba(255, 255, 255, 0.07);
      --border-active: rgba(255, 220, 120, 0.2);
      --text-primary: #f5f0ff;
      --text-secondary: #a093b8;
      --text-muted: #6b5f80;

      /* 基础群组配色，会被 JS 内联样式覆盖 */
      --group-theme: #f59e0b;
      --group-theme-rgb: 245, 158, 11;

      --radius-2xl: 24px;
      --radius-xl: 18px;
      --radius-lg: 14px;
      --radius-md: 10px;

      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* 炫酷的动态背景微光 */
    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -2;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.22;
      pointer-events: none;
    }

    body::before {
      width: 50vw;
      height: 50vw;
      left: -15vw;
      top: -15vw;
      /* 暖金琥珀光晕 */
      background: radial-gradient(circle, #d97706 0%, #92400e 45%, transparent 70%);
      opacity: 0.18;
      animation: float-glow 25s ease-in-out infinite alternate;
    }

    body::after {
      width: 45vw;
      height: 45vw;
      right: -12vw;
      bottom: -12vw;
      /* 玫瑰金 / 紫红光晕 */
      background: radial-gradient(circle, #c084fc 0%, #7c3aed 50%, transparent 70%);
      opacity: 0.16;
      animation: float-glow 30s ease-in-out infinite alternate-reverse;
    }

    .bg-glow-3 {
      content: "";
      position: fixed;
      z-index: -2;
      border-radius: 50%;
      filter: blur(140px);
      opacity: 0.13;
      pointer-events: none;
      width: 40vw;
      height: 40vw;
      left: 30vw;
      top: 30vh;
      /* 冰蓝中轴点缀 */
      background: radial-gradient(circle, #38bdf8 0%, #0ea5e9 50%, transparent 70%);
      animation: float-glow 28s ease-in-out infinite alternate;
    }

    @keyframes float-glow {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(6%, 8%) scale(1.15); }
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--group-theme);
      outline-offset: 3px;
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 40px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    /* Hero Banner 样式优化 */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 48px 40px;
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      background: linear-gradient(135deg, rgba(22, 16, 40, 0.6) 0%, rgba(12, 10, 22, 0.35) 100%);
      box-shadow: 0 20px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 220, 120, 0.06);
      backdrop-filter: blur(24px) saturate(150%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      /* 右上角暖金光 + 左下角紫蓝光 */
      background:
        radial-gradient(circle at 95% 5%, rgba(251, 191, 36, 0.1) 0%, transparent 45%),
        radial-gradient(circle at 5% 95%, rgba(139, 92, 246, 0.08) 0%, transparent 45%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 6px 14px;
      /* 暖金眉标 */
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 999px;
      color: #fcd34d;
      background: rgba(251, 191, 36, 0.08);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
      box-shadow: 0 0 16px rgba(251, 191, 36, 0.07);
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.03em;
      max-width: 800px;
      /* 标题：白 → 暖金 → 淡紫 三段渐变 */
      background: linear-gradient(100deg, #ffffff 0%, #fde68a 40%, #c4b5fd 80%, #e0e7ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      margin-top: 16px;
      color: var(--text-secondary);
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.6;
      max-width: 720px;
      font-weight: 300;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 32px;
    }

    .stat {
      padding: 12px 20px;
      border: 1px solid rgba(255, 220, 120, 0.08);
      border-radius: var(--radius-xl);
      background: rgba(255, 210, 80, 0.03);
      min-width: 120px;
      backdrop-filter: blur(10px);
    }

    .stat strong {
      display: block;
      font-size: 26px;
      font-weight: 800;
      /* 数字：白 → 暖金 渐变 */
      background: linear-gradient(135deg, #ffffff, #fcd34d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat span {
      display: block;
      margin-top: 4px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 400;
    }

    /* Bento Grid 主布局 */
    .bento-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }

    .bento-sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section-head {
      padding: 8px 4px;
    }

    .section-head h2 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f3f4f6;
    }

    .section-head p {
      color: var(--text-secondary);
      font-size: 13px;
      margin-top: 4px;
    }

    .group-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 群组卡片样式设计 */
    .group-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: 0 4px 20px -5px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
    }

    .group-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      border: 1px solid transparent;
      background: linear-gradient(135deg, rgba(var(--group-theme-rgb), 0.2), transparent) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .group-card:hover {
      transform: translateY(-4px);
      background: var(--panel-hover);
      box-shadow: 0 12px 30px -10px rgba(var(--group-theme-rgb), 0.25);
      border-color: rgba(var(--group-theme-rgb), 0.2);
    }

    .group-card:hover::before {
      opacity: 1;
    }

    .group-card.active {
      background: rgba(var(--group-theme-rgb), 0.08);
      border-color: rgba(var(--group-theme-rgb), 0.35);
      box-shadow: 0 8px 25px -8px rgba(var(--group-theme-rgb), 0.3);
    }

    .group-card.active::before {
      opacity: 1;
      background: linear-gradient(135deg, rgba(var(--group-theme-rgb), 0.5), transparent) border-box;
    }

    .group-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      background: linear-gradient(135deg, rgba(var(--group-theme-rgb), 0.8), rgba(var(--group-theme-rgb), 0.4));
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 6px 16px -4px rgba(var(--group-theme-rgb), 0.4);
      flex-shrink: 0;
    }

    .group-card-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow: hidden;
    }

    .group-card h3 {
      font-size: 16px;
      font-weight: 700;
      color: #f3f4f6;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .group-card p {
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .group-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(var(--group-theme-rgb), 0.15);
      background: rgba(var(--group-theme-rgb), 0.05);
      color: var(--group-theme);
      white-space: nowrap;
    }

    /* 右侧章节展示区 */
    .library-panel {
      border: 1px solid var(--border);
      border-radius: var(--radius-2xl);
      background: var(--panel);
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
      padding: 32px;
      min-height: 500px;
    }

    .library-header {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .library-badge-wrapper {
      margin-bottom: 8px;
    }

    .badge-pill {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(var(--group-theme-rgb), 0.2);
      background: rgba(var(--group-theme-rgb), 0.08);
      color: var(--group-theme);
      display: inline-block;
    }

    .library-header h2 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #ffffff;
    }

    .library-header p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 6px;
      font-weight: 300;
    }

    .date-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* 漫画章节卡片样式 */
    .episode-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 20px;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      background: rgba(255, 255, 255, 0.01);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .episode-card:hover {
      transform: translateX(4px);
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(var(--group-theme-rgb), 0.25);
      box-shadow: inset 0 0 15px rgba(var(--group-theme-rgb), 0.05);
    }

    .episode-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .episode-main h3 {
      font-size: 18px;
      font-weight: 700;
      color: #f3f4f6;
      letter-spacing: -0.02em;
    }

    .episode-main p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      font-weight: 300;
    }

    .open-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 18px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .episode-card:hover .open-mark {
      background: var(--group-theme);
      color: #030712;
      border-color: var(--group-theme);
      box-shadow: 0 0 15px rgba(var(--group-theme-rgb), 0.4);
      transform: translateX(4px);
    }

    .empty-state {
      padding: 40px;
      border: 1px dashed var(--border);
      border-radius: var(--radius-xl);
      color: var(--text-secondary);
      background: rgba(255, 255, 255, 0.01);
      text-align: center;
      font-size: 14px;
    }

    /* 骨架屏 */
    .skeleton-card {
      pointer-events: none;
    }

    .skeleton-block {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
    }

    .skeleton-text-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skeleton-line {
      height: 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 999px;
      position: relative;
      overflow: hidden;
    }

    .skeleton-line.title {
      width: 60%;
      height: 16px;
    }

    .skeleton-line.short {
      width: 40%;
    }

    .skeleton-block::after,
    .skeleton-line::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      /* 骨架屏微光：暖金色调 */
      background: linear-gradient(90deg, transparent, rgba(251, 191, 36, 0.06), rgba(255, 255, 255, 0.04), transparent);
      animation: shimmer 1.8s infinite;
    }

    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }

    /* =======================
       全屏沉浸式 Loading 动画
       ======================= */
    .global-loader {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      /* 匹配午夜金紫底色，并叠加双向光晕 */
      background:
        radial-gradient(ellipse at 20% 20%, rgba(245, 158, 11, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(192, 132, 252, 0.1) 0%, transparent 50%),
        var(--bg);
      opacity: 1;
      visibility: visible;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
    }

    .global-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* 多环旋转主体 */
    .loader-rings {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 40px;
    }

    /* 三层同心圆，速度不同、方向相反 */
    .loader-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
    }

    /* 外环：金色，慢速顺时针 */
    .loader-ring-outer {
      border-top-color: rgba(245, 158, 11, 0.9);
      border-right-color: rgba(245, 158, 11, 0.25);
      animation: ring-spin-cw 2.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 18px rgba(245, 158, 11, 0.2);
    }

    /* 中环：玫瑰紫，快速逆时针 */
    .loader-ring-mid {
      inset: 16px;
      border-top-color: transparent;
      border-right-color: rgba(192, 132, 252, 0.9);
      border-bottom-color: rgba(192, 132, 252, 0.2);
      animation: ring-spin-ccw 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      box-shadow: 0 0 14px rgba(192, 132, 252, 0.2);
    }

    /* 内环：冰蓝，中速顺时针 */
    .loader-ring-inner {
      inset: 32px;
      border-top-color: rgba(56, 189, 248, 0.8);
      border-left-color: rgba(56, 189, 248, 0.2);
      animation: ring-spin-cw 1.1s linear infinite;
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }

    /* 中心光点 */
    .loader-core {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 10px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fcd34d 0%, rgba(245, 158, 11, 0.4) 60%, transparent 100%);
      box-shadow: 0 0 12px 4px rgba(245, 158, 11, 0.4);
      animation: core-pulse 1.8s ease-in-out infinite;
    }

    @keyframes ring-spin-cw {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes ring-spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes core-pulse {
      0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
    }

    /* 品牌文字区 */
    .loader-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(100deg, #ffffff 0%, #fde68a 45%, #c4b5fd 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      text-align: center;
    }

    .loader-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* 底部三颗呼吸节拍灯 */
    .loader-dots {
      display: flex;
      gap: 8px;
      margin-top: 32px;
    }

    .loader-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(245, 158, 11, 0.5);
      animation: dot-bounce 1.4s ease-in-out infinite both;
    }

    .loader-dot:nth-child(1) { animation-delay: 0s; background: rgba(245, 158, 11, 0.8); }
    .loader-dot:nth-child(2) { animation-delay: 0.2s; background: rgba(192, 132, 252, 0.8); }
    .loader-dot:nth-child(3) { animation-delay: 0.4s; background: rgba(56, 189, 248, 0.8); }

    @keyframes dot-bounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1.3); opacity: 1; }
    }

    /* 减弱动效模式 */
    @media (prefers-reduced-motion: reduce) {
      .loader-ring-outer,
      .loader-ring-mid,
      .loader-ring-inner,
      .loader-core,
      .loader-dot {
        animation: none;
      }
    }

    /* Footer 样式重构 */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 24px;
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 8px #10b981;
    }

    .footer-right {
      text-align: right;
    }

    /* 移动端自适应 */
    @media (max-width: 900px) {
      .bento-grid {
        grid-template-columns: 1fr;
      }
      .shell {
        padding: 24px 16px 40px;
      }
      .hero {
        padding: 32px 24px;
      }
      .library-panel {
        padding: 20px;
      }
      .episode-card {
        grid-template-columns: 1fr;
        gap: 12px;
      }
      .open-mark {
        width: 100%;
        border-radius: var(--radius-lg);
        height: 36px;
      }
      footer {
        flex-direction: column;
        gap: 12px;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <!-- 第三重影背景光效 -->
  <div class="bg-glow-3" aria-hidden="true"></div>

  <div class="global-loader" id="global-loader" role="status" aria-live="polite" aria-label="页面资源加载状态">
    <!-- 三环旋转动画 -->
    <div class="loader-rings" aria-hidden="true">
      <div class="loader-ring loader-ring-outer"></div>
      <div class="loader-ring loader-ring-mid"></div>
      <div class="loader-ring loader-ring-inner"></div>
      <div class="loader-core"></div>
    </div>
    <!-- 品牌文字 -->
    <div class="loader-title">群聊日更漫画馆</div>
    <div class="loader-subtitle">正在整理首页入口和关键资源</div>
    <!-- 节拍指示灯 -->
    <div class="loader-dots" aria-hidden="true">
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
      <span class="loader-dot"></span>
    </div>
  </div>

  <div class="shell">
    <header class="hero">
      <div class="eyebrow">✨ 群聊日更 · 漫画馆门户</div>
      <h1>把每天的群聊，收进一座舒服的漫画馆。</h1>
      <p>这里按群整理每日聊天记录漫画。先选择左侧微信群，右侧即刻渲染对应日期的漫画话数。轻点卡片直达精美漫画舞台。</p>
      <div class="stats" aria-label="内容统计">
        <div class="stat"><strong id="groupCount">0</strong><span>已收录群</span></div>
        <div class="stat"><strong id="episodeCount">0</strong><span>漫画总话数</span></div>
        <div class="stat"><strong id="latestDate">-</strong><span>最新更新</span></div>
      </div>
    </header>

    <main class="bento-grid">
      <!-- 左侧 Bento: 选择群入口 -->
      <section class="bento-sidebar" aria-labelledby="groupsTitle">
        <div class="section-head">
          <h2 id="groupsTitle">选择群入口</h2>
          <p>点击下方群磁贴，切换漫画话数目录</p>
        </div>
        <div id="groupGrid" class="group-grid" aria-busy="true">
          <!-- 骨架屏组件 -->
          <div class="group-card skeleton-card" aria-hidden="true">
            <span class="skeleton-block"></span>
            <span class="skeleton-text-wrapper">
              <span class="skeleton-line title"></span>
              <span class="skeleton-line"></span>
              <span class="skeleton-line short"></span>
            </span>
          </div>
        </div>
      </section>

      <!-- 右侧 Bento: 漫画日期目录 -->
      <section id="library" class="bento-main library-panel" aria-live="polite" aria-busy="true">
        <div class="library-header">
          <div class="library-badge-wrapper">
            <span id="activeGroupMeta" class="badge-pill">载入中</span>
          </div>
          <h2 id="activeGroupName">正在整理漫画馆</h2>
          <p id="activeGroupDesc">群入口和日期入口马上显示。</p>
        </div>
        <div id="dateList" class="date-list" aria-busy="true">
          <div class="episode-card skeleton-episode" aria-hidden="true">
            <span class="skeleton-block" style="width: 100px; height: 72px;"></span>
            <span class="episode-main">
              <span class="skeleton-line title" style="width: 40%"></span>
              <span class="skeleton-line"></span>
            </span>
            <span class="skeleton-block" style="width: 40px; height: 40px; border-radius: 50%;"></span>
          </div>
          <div class="episode-card skeleton-episode" aria-hidden="true">
            <span class="skeleton-block" style="width: 100px; height: 72px;"></span>
            <span class="episode-main">
              <span class="skeleton-line title" style="width: 45%"></span>
              <span class="skeleton-line"></span>
            </span>
            <span class="skeleton-block" style="width: 40px; height: 40px; border-radius: 50%;"></span>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-left">
        <span class="status-dot"></span>
        <span>线上漫画馆：按群组与日期浏览</span>
      </div>
      <div class="footer-right">
        <span>© WeChat Daily Comic Gallery</span>
      </div>
    </footer>
  </div>

  <script>
    const catalog = [
      {
        id: "ai-books-study",
        name: "AI全书学习交流群",
        icon: "📘",
        themeColor: "#f59e0b",
        themeRgb: "245, 158, 11",
        description: "围绕 AI 工具、账号事故、硬盘急诊和群聊吐槽展开的日更漫画。",
        path: "AI全书学习交流群/",
        episodes: [
          {
            date: "2026-05-26",
            title: "20260526话《额度迷宫与漫画馆出道》",
            summary: "从中转水表、支付门、额度焦虑、小作文门、配置迷宫到漫画馆出道、职场吐槽和假 Codex 的一整天群聊小剧场。",
            href: "AI全书学习交流群/2026-05-26/index.html"
          },
          {
            date: "2026-05-25",
            title: "20260525话《账号拉闸，群聊开庭》",
            summary: "从 Claude Code 输出爆掉到账号拉闸、验证门、工具跑偏 and 职场坑洞的一整天群聊小剧场。",
            href: "AI全书学习交流群/2026-05-25/index.html"
          },
          {
            date: "2026-05-24",
            title: "20260524话《硬盘一转，群聊开会》",
            summary: "沙雕鱼的机械硬盘疑似阵亡，群聊瞬间变成远程硬盘急诊，深夜又接上账号陨落。",
            href: "AI全书学习交流群/2026-05-24/index.html"
          }
        ]
      },
      {
        id: "ai-editor-tech-2",
        name: "AI编辑器技术讨论-二群",
        icon: "💻",
        themeColor: "#c084fc",
        themeRgb: "192, 132, 252",
        description: "围绕 AI 编辑器、ComfyUI、生图工具、显卡焦虑和云端订阅展开的技术群聊漫画。",
        path: "AI编辑器技术讨论-二群/",
        episodes: [
          {
            date: "2026-05-26",
            title: "20260526话《中转雷达与清理风暴》",
            summary: "从公益站链接雨、中转安全课、通道维护、wechat-cli 漫画工厂、隐私警报到清理机器人翻车的一整天群聊小剧场。",
            href: "AI编辑器技术讨论-二群/2026-05-26/index.html"
          },
          {
            date: "2026-05-25",
            title: "20260525话《验证门与号商早餐钱》",
            summary: "从 image API、验证门、401 幽灵、token 消防到早餐钱黑盒工坊和深夜审核风暴的一整天群聊小剧场。",
            href: "AI编辑器技术讨论-二群/2026-05-25/index.html"
          },
          {
            date: "2026-05-24",
            title: "20260524话《显卡烟囱，AI生图审判》",
            summary: "从考试题库、ComfyUI、本地显卡、云端视频到 AI 生图乱码审判的一天群聊小剧场。",
            href: "AI编辑器技术讨论-二群/2026-05-24/index.html"
          }
        ]
      }
    ];

    const globalLoader = document.getElementById("global-loader");
    const groupGrid = document.getElementById("groupGrid");
    const dateList = document.getElementById("dateList");
    const library = document.getElementById("library");
    const activeGroupName = document.getElementById("activeGroupName");
    const activeGroupDesc = document.getElementById("activeGroupDesc");
    const activeGroupMeta = document.getElementById("activeGroupMeta");
    const groupCount = document.getElementById("groupCount");
    const episodeCount = document.getElementById("episodeCount");
    const latestDate = document.getElementById("latestDate");

    function escapeHTML(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));
    }


    function hideGlobalLoader() {
      if (globalLoader.hasAttribute("hidden")) return;
      globalLoader.classList.add("is-hidden");
      window.setTimeout(() => globalLoader.setAttribute("hidden", ""), 400);
    }


    function setCatalogBusy(isBusy) {
      groupGrid.setAttribute("aria-busy", String(isBusy));
      dateList.setAttribute("aria-busy", String(isBusy));
      library.setAttribute("aria-busy", String(isBusy));
    }


    function renderStats() {
      const episodes = catalog.flatMap(group => group.episodes);
      const latest = episodes.map(episode => episode.date).sort().at(-1) || "-";
      groupCount.textContent = catalog.length;
      episodeCount.textContent = episodes.length;
      latestDate.textContent = latest;
    }

    function renderGroups(activeId) {
      groupGrid.innerHTML = catalog.map(group => `
        <button class="group-card${group.id === activeId ? " active" : ""}" 
                type="button" 
                data-group-id="${escapeHTML(group.id)}"
                style="--group-theme: ${group.themeColor}; --group-theme-rgb: ${group.themeRgb};">
          <span class="group-icon" aria-hidden="true">${escapeHTML(group.icon || group.name.slice(0, 1))}</span>
          <span class="group-card-content">
            <h3>${escapeHTML(group.name)}</h3>
            <p>${escapeHTML(group.description)}</p>
            <span class="group-meta">
              <span class="pill">${group.episodes.length} 话漫画</span>
            </span>
          </span>
        </button>
      `).join("");

      groupGrid.querySelectorAll(".group-card").forEach(card => {
        card.addEventListener("click", () => selectGroup(card.dataset.groupId, true));
      });
    }

    function renderEpisodes(group) {
      activeGroupName.textContent = group.name;
      activeGroupDesc.textContent = group.description;
      activeGroupMeta.textContent = `${group.episodes.length} 话 · 按日期倒序`;

      if (group.episodes.length === 0) {
        dateList.innerHTML = "<div class=\"empty-state\">这个群还没有可打开的漫画页面。</div>";
        return;
      }

      dateList.innerHTML = group.episodes.map(episode => `
        <a class="episode-card" href="${escapeHTML(episode.href)}">
          <span class="episode-main">
            <h3>${escapeHTML(episode.title)}</h3>
            <p>${escapeHTML(episode.summary)}</p>
          </span>
          <span class="open-mark" aria-hidden="true">→</span>
        </a>
      `).join("");
    }

    function selectGroup(id, shouldScroll) {
      const group = catalog.find(item => item.id === id) || catalog[0];
      if (!group) return;
      history.replaceState(null, "", `#${group.id}`);
      
      // 动态更新右侧看板的主题变量
      library.style.setProperty("--group-theme", group.themeColor);
      library.style.setProperty("--group-theme-rgb", group.themeRgb);

      renderGroups(group.id);
      renderEpisodes(group);
      if (shouldScroll) {
        // 大屏下滚动到展厅，如果是在小屏下尤为必要
        document.getElementById("library").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    renderStats();
    selectGroup(location.hash.replace("#", "") || catalog[0]?.id, false);
    setCatalogBusy(false);
    hideGlobalLoader();
  </script>
</body>
</html>
