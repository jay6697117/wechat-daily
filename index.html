<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>群聊日更漫画馆</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      color-scheme: dark;
      --bg: #06111f;
      --bg-soft: #0d2238;
      --card: rgba(10, 20, 35, 0.78);
      --card-strong: rgba(15, 27, 46, 0.92);
      --ink: #f7fbff;
      --muted: #aabbd0;
      --line: rgba(156, 205, 255, 0.18);
      --green: #82f7c5;
      --green-deep: #35d694;
      --blue: #79b8ff;
      --blue-deep: #4f8cff;
      --yellow: #ffe08a;
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
      --focus: rgba(130, 247, 197, 0.9);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 8%, rgba(130, 247, 197, 0.2), transparent 31rem),
        radial-gradient(circle at 90% 2%, rgba(121, 184, 255, 0.26), transparent 28rem),
        radial-gradient(circle at 58% 86%, rgba(255, 224, 138, 0.13), transparent 30rem),
        linear-gradient(135deg, var(--bg), var(--bg-soft) 58%, #050913);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.66;
    }

    body::before {
      width: 340px;
      height: 340px;
      left: -130px;
      bottom: 12vh;
      background: rgba(255, 224, 138, 0.2);
    }

    body::after {
      width: 280px;
      height: 280px;
      right: -120px;
      top: 34vh;
      background: rgba(121, 184, 255, 0.18);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      padding: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(13, 34, 56, 0.92), rgba(8, 17, 31, 0.7)),
        linear-gradient(120deg, rgba(130, 247, 197, 0.14), rgba(121, 184, 255, 0.16));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(135%);
    }

    .hero::after {
      content: "";
      position: absolute;
      right: 46px;
      top: 38px;
      width: 164px;
      height: 164px;
      border-radius: 44% 56% 52% 48%;
      background:
        radial-gradient(circle at 38% 35%, #ffffff 0 7px, transparent 8px),
        radial-gradient(circle at 62% 35%, #ffffff 0 7px, transparent 8px),
        linear-gradient(135deg, rgba(130, 247, 197, 0.86), rgba(79, 140, 255, 0.78));
      opacity: 0.78;
      transform: rotate(-8deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 20px;
      padding: 8px 14px;
      border: 1px solid rgba(130, 247, 197, 0.28);
      border-radius: 999px;
      color: var(--green);
      background: rgba(130, 247, 197, 0.09);
      font-size: 14px;
      font-weight: 700;
    }

    .hero h1 {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0;
      color: transparent;
      background: linear-gradient(135deg, #ffffff 0%, #bfffe0 42%, #9ccaff 100%);
      background-clip: text;
      -webkit-background-clip: text;
      font-size: clamp(42px, 7vw, 86px);
      line-height: 0.95;
      letter-spacing: -0.07em;
      text-shadow: 0 18px 58px rgba(130, 247, 197, 0.14);
    }

    .hero p {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 22px 0 0;
      color: var(--muted);
      font-size: clamp(17px, 2.2vw, 22px);
      line-height: 1.76;
    }

    .stats {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
    }

    .stat {
      min-width: 132px;
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
    }

    .stat strong {
      display: block;
      font-size: 28px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      margin: 46px 0 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: -0.04em;
    }

    .section-head p {
      max-width: 520px;
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      text-align: right;
    }

    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .group-card {
      position: relative;
      display: grid;
      gap: 18px;
      min-height: 228px;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--card);
      box-shadow: 0 14px 42px rgba(39, 97, 82, 0.1);
      backdrop-filter: blur(16px);
      content-visibility: auto;
      contain-intrinsic-size: 228px;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      cursor: pointer;
    }

    .group-card:hover,
    .group-card.active {
      transform: translateY(-4px);
      border-color: rgba(130, 247, 197, 0.36);
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.32), 0 0 0 1px rgba(130, 247, 197, 0.08);
    }

    .group-card:focus-visible {
      transform: translateY(-4px);
      border-color: rgba(130, 247, 197, 0.56);
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.32);
    }

    .group-card.active::before {
      content: "当前选中";
      position: absolute;
      right: 22px;
      top: 22px;
      padding: 6px 10px;
      border-radius: 999px;
      color: #06111f;
      background: linear-gradient(135deg, var(--green), var(--blue));
      box-shadow: 0 10px 24px rgba(53, 214, 148, 0.22);
      font-size: 12px;
      font-weight: 800;
    }

    .group-icon {
      width: 60px;
      height: 60px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #06111f;
      background: linear-gradient(135deg, var(--green), var(--blue));
      font-size: 28px;
      font-weight: 900;
      box-shadow: 0 14px 34px rgba(79, 140, 255, 0.25);
    }

    .group-card h3 {
      margin: 0;
      font-size: 24px;
      letter-spacing: -0.03em;
    }

    .group-card p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.64;
    }

    .group-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: auto;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(130, 247, 197, 0.18);
      color: var(--green);
      background: rgba(130, 247, 197, 0.1);
      font-size: 13px;
      font-weight: 700;
    }

    .library-panel {
      margin-top: 18px;
      padding: 30px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: rgba(8, 17, 31, 0.76);
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(18px) saturate(135%);
    }

    .library-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }

    .library-title h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: -0.04em;
    }

    .library-title p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .date-list {
      display: grid;
      gap: 14px;
    }

    .episode-card {
      display: grid;
      grid-template-columns: minmax(132px, 170px) 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--card-strong);
      content-visibility: auto;
      contain-intrinsic-size: 132px;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .episode-card:hover,
    .episode-card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(121, 184, 255, 0.36);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28), 0 0 0 1px rgba(121, 184, 255, 0.08);
    }

    .date-badge {
      display: grid;
      gap: 6px;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(130, 247, 197, 0.16);
      color: #d8fff0;
      background: linear-gradient(135deg, rgba(130, 247, 197, 0.14), rgba(121, 184, 255, 0.14));
      font-weight: 900;
    }

    .date-badge span:first-child {
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .date-badge span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .episode-main h3 {
      margin: 0;
      font-size: clamp(20px, 3vw, 28px);
      letter-spacing: -0.04em;
    }

    .episode-main p {
      margin: 9px 0 0;
      color: var(--muted);
      line-height: 1.58;
    }

    .open-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      color: #06111f;
      background: linear-gradient(135deg, var(--green), var(--blue));
      box-shadow: 0 12px 28px rgba(79, 140, 255, 0.24);
      font-size: 22px;
      font-weight: 900;
      transition: transform 160ms ease;
    }

    .episode-card:hover .open-mark,
    .episode-card:focus-visible .open-mark {
      transform: translateX(3px);
    }

    .empty-state {
      padding: 28px;
      border: 1px dashed rgba(130, 247, 197, 0.3);
      border-radius: var(--radius-md);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.06);
      text-align: center;
    }

    .skeleton-card,
    .skeleton-episode {
      pointer-events: none;
      cursor: progress;
    }

    .skeleton-block,
    .skeleton-line,
    .skeleton-pill {
      display: block;
      overflow: hidden;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.06), rgba(130, 247, 197, 0.18), rgba(255, 255, 255, 0.06)),
        rgba(255, 255, 255, 0.08);
      background-size: 220% 100%, 100% 100%;
      animation: skeleton-shimmer 1400ms ease-in-out infinite;
    }

    .skeleton-block {
      width: 60px;
      height: 60px;
      border-radius: 20px;
    }

    .skeleton-line {
      width: 100%;
      height: 14px;
    }

    .skeleton-line.title {
      width: min(360px, 64%);
      height: 24px;
    }

    .skeleton-line.short {
      width: 48%;
    }

    .skeleton-pill {
      width: 96px;
      height: 30px;
    }

    .skeleton-episode .skeleton-block {
      width: 100%;
      height: 72px;
      border-radius: 16px;
    }

    @keyframes skeleton-shimmer {
      from {
        background-position: 120% 0, 0 0;
      }

      to {
        background-position: -120% 0, 0 0;
      }
    }

    .global-loader {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 20% 16%, rgba(130, 247, 197, 0.22), transparent 30%),
        radial-gradient(circle at 82% 12%, rgba(121, 184, 255, 0.28), transparent 28%),
        linear-gradient(135deg, rgba(6, 17, 31, 0.98), rgba(13, 34, 56, 0.96) 56%, rgba(5, 9, 19, 0.98));
      opacity: 1;
      visibility: visible;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .global-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .global-loader-card {
      display: grid;
      justify-items: center;
      gap: 12px;
      width: min(320px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(10, 20, 35, 0.88);
      box-shadow: var(--shadow);
      color: var(--ink);
      text-align: center;
      backdrop-filter: blur(18px);
    }

    .global-loader-card strong {
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .global-loader-card span:last-child {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .global-loader-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(130, 247, 197, 0.14);
      border-top-color: var(--green);
      border-radius: 999px;
      animation: loader-spin 900ms linear infinite;
    }

    @keyframes loader-spin {
      to {
        transform: rotate(1turn);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .group-card,
      .episode-card,
      .open-mark,
      .global-loader {
        transition: none;
      }

      .skeleton-block,
      .skeleton-line,
      .skeleton-pill,
      .global-loader-spinner {
        animation: none;
      }
    }

    footer {
      margin-top: 42px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      font-size: 14px;
    }

    @media (max-width: 760px) {
      .shell {
        width: min(100% - 24px, 1180px);
        padding: 18px 0 40px;
      }

      .hero {
        padding: 30px 24px;
      }

      .hero::after {
        width: 98px;
        height: 98px;
        right: 18px;
        top: 20px;
        opacity: 0.42;
      }

      .section-head,
      .library-title {
        display: block;
      }

      .section-head p {
        margin-top: 10px;
        text-align: left;
      }

      .library-panel {
        padding: 18px;
      }

      .episode-card {
        grid-template-columns: 1fr;
      }

      .open-mark {
        width: 100%;
        border-radius: 14px;
      }
    }
  </style>
</head>

    function escapeHTML(value) {
      return String(value).replace(/[&<>'"]/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#39;",
        '"': "&quot;"
      }[char]));

    let catalogReady = false;

    function hideGlobalLoader() {

      dateList.setAttribute("aria-busy", String(isBusy));
      library.setAttribute("aria-busy", String(isBusy));
    }

    function scheduleInitialRender(callback) {
      window.requestAnimationFrame(() => {
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(callback, { timeout: 900 });
        } else {
          window.setTimeout(callback, 80);
        }
      });
    }

    function renderStats() {
      const episodes = catalog.flatMap(group => group.episodes);
      const latest = episodes.map(episode => episode.date).sort().at(-1) || "-";
      groupCount.textContent = catalog.length;
      episodeCount.textContent = episodes.length;
      latestDate.textContent = latest;
    }

    function renderGroups(activeId) {
      groupGrid.innerHTML = catalog.map(group => `
        <button class="group-card${group.id === activeId ? " active" : ""}" type="button" data-group-id="${escapeHTML(group.id)}">
          <span class="group-icon" aria-hidden="true">${escapeHTML(group.name.slice(0, 1))}</span>
          <span>
            <h3>${escapeHTML(group.name)}</h3>
            <p>${escapeHTML(group.description)}</p>
          </span>
          <span class="group-meta">
            <span class="pill">${group.episodes.length} 话漫画</span>
            <span class="pill">${escapeHTML(group.path)}</span>
          </span>
        </button>
      `).join("");

      groupGrid.querySelectorAll(".group-card").forEach(card => {
        card.addEventListener("click", () => selectGroup(card.dataset.groupId, true));
      });
    }

    function renderEpisodes(group) {
      activeGroupName.textContent = group.name;
      activeGroupDesc.textContent = group.description;
      activeGroupMeta.textContent = `${group.episodes.length} 话 · 按日期倒序`;

      if (group.episodes.length === 0) {
        dateList.innerHTML = "<div class=\"empty-state\">这个群还没有可打开的漫画页面。</div>";
        return;
      }

      dateList.innerHTML = group.episodes.map(episode => `
        <a class="episode-card" href="${escapeHTML(episode.href)}">
          <span class="date-badge">
            <span>${escapeHTML(episode.date)}</span>
            <span>YYYY-MM-DD</span>
          </span>
          <span class="episode-main">
            <h3>${escapeHTML(episode.title)}</h3>
            <p>${escapeHTML(episode.summary)}</p>
          </span>
          <span class="open-mark" aria-hidden="true">›</span>
        </a>
      `).join("");
    }

    function selectGroup(id, shouldScroll) {
      const group = catalog.find(item => item.id === id) || catalog[0];
      if (!group) return;
      history.replaceState(null, "", `#${group.id}`);
      renderGroups(group.id);
      renderEpisodes(group);
      if (shouldScroll) {
        document.getElementById("library").scrollIntoView({ behavior: "smooth", block: "start" });
      }
    }

    renderStats();
    scheduleInitialRender(() => {
      selectGroup(location.hash.replace("#", "") || catalog[0]?.id, false);
      setCatalogBusy(false);
      catalogReady = true;
      updateGlobalLoader();
    });
  </script>
</body>
</html>
